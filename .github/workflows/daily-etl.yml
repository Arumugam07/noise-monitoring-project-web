name: Daily Noise Monitoring ETL

on:
  # Run automatically every day at 1:00 AM SGT (5:00 PM UTC previous day)
  schedule:
    - cron: '0 17 * * *'  # 1:00 AM Singapore Time = 5:00 PM UTC
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: 'Optional: Specific date to fetch (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
        type: string

jobs:
  fetch-daily-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run daily ETL script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: http://139.59.223.231:3000/api/meter-sound
          SUPABASE_TABLE: meter_readings
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "Fetching data for specific date: ${{ github.event.inputs.date }}"
            python test_single_day.py ${{ github.event.inputs.date }}
          else
            echo "Fetching yesterday's data (default)"
            python supabase_daily.py
          fi
      
      - name: Refresh materialized view
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python -c "
          from supabase import create_client
          import os
          
          supabase = create_client(
              os.environ['SUPABASE_URL'],
              os.environ['SUPABASE_ANON_KEY']
          )
          
          # Refresh the materialized view
          supabase.rpc('exec_sql', {'sql': 'REFRESH MATERIALIZED VIEW public.wide_view_mv;'}).execute()
          print('✅ Materialized view refreshed successfully')
          "
      
      - name: Report success
        if: success()
        run: |
          echo "✅ Daily ETL completed successfully!"
          echo "Data has been fetched and materialized view has been refreshed."
      
      - name: Report failure
        if: failure()
        run: |
          echo "❌ Daily ETL failed. Check the logs above for details."
          exit 1
