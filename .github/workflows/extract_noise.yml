name: Extract Noise Excel Apr2025-May2026
 
on:
  workflow_dispatch:
 
jobs:
  extract-noise:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # large dataset — give it room
    env:
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas xlsxwriter openpyxl
 
      - name: Run export
        run: python extract_noise_apr2025_may2026.py
 
      - name: Upload Excel file
        uses: actions/upload-artifact@v4
        with:
          name: noise-1-apr-2025-to-31-may-2026
          path: "noise_1_apr_2025_to_31_may_2026.xlsx"
          if-no-files-found: error
          retention-days: 30
