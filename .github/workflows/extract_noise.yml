name: Extract Noise Data to Excel

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase pandas openpyxl python-dotenv

      - name: Run extraction script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python extract_noise.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: noise-readings-2025-2026
          path: noise_2025_2026.xlsx
          retention-days: 7
