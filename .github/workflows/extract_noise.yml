name: Extract Noise Data to Excel

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase pandas openpyxl python-dotenv

      - name: Validate secrets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ Missing SUPABASE_ANON_KEY"
            exit 1
          fi

          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ Missing SUPABASE_URL"
            exit 1
          fi

          echo "✅ Secrets OK"

      - name: Test Supabase connection
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os
          from supabase import create_client

          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_ANON_KEY"]

          print(f"Connecting to: {url}")
          client = create_client(url, key)

          resp = client.table("meter_readings").select("reading_datetime", count="exact").limit(1).execute()

          print(f"✅ Connection successful. Total rows: {resp.count}")
          PYEOF

      - name: Run extraction
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python extract_noise.py

      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: noise-readings-2025-2026
          path: noise_2025_2026.xlsx
          retention-days: 7
