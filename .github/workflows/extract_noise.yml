name: Extract Noise Data to Excel

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase pandas openpyxl python-dotenv

      - name: Check secrets are set
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ SUPABASE_ANON_KEY secret is NOT set"
            exit 1
          else
            echo "✅ SUPABASE_ANON_KEY environment variable verified"
          fi

      - name: Test Supabase connection + row count
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python - <<'PYEOF'
          import os
          from supabase import create_client
          
          url = "https://supabase.co"
          key = os.environ["SUPABASE_ANON_KEY"]
          
          print("Connecting to production API gateway...")
          client = create_client(url, key)
          
          # Check total rows in table
          resp = client.table("meter_readings").select("reading_datetime", count="exact").limit(1).execute()
          print(f"Total rows in meter_readings: {resp.count}")
          
          # Check earliest and latest
          r1 = client.table("meter_readings").select("reading_datetime").order("reading_datetime", desc=False).limit(1).execute()
          r2 = client.table("meter_readings").select("reading_datetime").order("reading_datetime", desc=True).limit(1).execute()
          
          if r1.data:
              print(f"Earliest entry timestamp: {r1.data[0]['reading_datetime']}")
          if r2.data:
              print(f"Latest entry timestamp:   {r2.data[0]['reading_datetime']}")
          PYEOF

      - name: Run extraction script
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python extract_noise.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: noise-readings-2025-2026
          path: noise_2025_2026.xlsx
          retention-days: 7
