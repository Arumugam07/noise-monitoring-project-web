name: Daily Noise Data ETL

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC = 8:00 AM SGT
  workflow_dispatch:

jobs:
  daily-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily ETL (complete previous day)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SUPABASE_TABLE: meter_readings
        run: python supabase_daily.py

      - name: Run Today's ETL (catch late data)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SUPABASE_TABLE: meter_readings
        run: python supabase_today.py

      # ── Always refresh MV after ETL so dashboard stays current ──
      - name: Refresh Materialized View
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python refresh_mv.py && echo "✅ MV refreshed" || echo "⚠️ MV refresh failed — check SUPABASE_SERVICE_KEY and that refresh_wide_view_mv() RPC exists"
